<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft &amp; Stamp — prompt drafting prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <svg class="mark" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="#D9785C" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="6.5" stroke="#D9785C" stroke-width="1"/>
        <circle cx="12" cy="12" r="3" fill="#D9785C"/>
      </svg>
      <span class="wordmark">Draft &amp; Stamp</span>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="main">
    <div class="paper-card" id="app"></div>
  </div>
  <div class="footer">
    Draft &amp; Stamp — prompts that actually work.
    &nbsp;·&nbsp; v1.21.8
  </div>
</div>

<!-- Auth modal (shown/hidden by JS) -->
<div id="auth-overlay" class="auth-overlay" style="display:none;" role="dialog" aria-modal="true">
  <div class="auth-modal" id="auth-modal-box"></div>
</div>

<!-- CDN libraries -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/morphdom@2.7.4/dist/morphdom.min.js"></script>

<!-- App scripts — load order matters: config → prompts → render → app -->
<script src="/js/config.js"></script>
<script src="/js/prompts.js"></script>
<script src="/js/render.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
